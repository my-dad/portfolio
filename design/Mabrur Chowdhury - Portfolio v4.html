  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

r(--dim-green);\">resume.pdf ↓<\u002Fa>\n        <button onclick=\"{{ toggleTheme }}\" aria-label=\"Toggle color theme\" style=\"background:none; border:1px solid var(--rule); border-radius:6px; padding:5px 10px; margin:0; font:inherit; font-size:13px; color:var(--muted); cursor:pointer; transition:all 0.15s;\" style-hover=\"color:var(--ink); border-color:var(--faint);\">{{ themeLabel }}<\u002Fbutton>\n      <\u002Fnav>\n    <\u002Fheader>\n\n    <!-- ============ INTRO ============ -->\n    <section data-screen-label=\"Intro\" style=\"padding:clamp(64px, 14vh, 150px) 0 clamp(48px, 9vh, 104px);\">\n      <p style=\"margin:0 0 24px; font-family:'JetBrains Mono', monospace; font-size:14px; color:var(--faint);\"><span style=\"color:var(--green);\">$<\u002Fspan> whoami <span style=\"color:var(--muted); font-style:italic;\">&nbsp;# 9 years, Kotlin, consumer scale<\u002Fspan><\u002Fp>\n      <h1 style=\"margin:0; font-family:'JetBrains Mono', monospace; font-weight:700; font-size:clamp(30px, 5.4vw, 60px); line-height:1.22; letter-spacing:-0.03em; max-width:19em; text-wrap:balance;\">\n        I build Android apps that <span style=\"color:var(--green);\">millions of people<\u002Fspan> depend on<span style=\"display:inline-block; width:0.5em; height:1em; background:var(--green); vertical-align:-0.12em; margin-left:0.08em; animation:mc-blink 1.1s step-end infinite;\"><\u002Fspan>\n      <\u002Fh1>\n      <p style=\"margin:clamp(28px, 4vh, 40px) 0 0; font-size:clamp(17px, 2vw, 20px); line-height:1.6; max-width:36em; color:var(--muted); text-wrap:pretty;\">\n        A national contact-tracing platform for Bangladesh. A super-app whose growth helped raise a <span style=\"color:var(--ink);\">$15M Series A<\u002Fspan>. Now: an end-to-end-encrypted messenger for the enterprise — built for networks that drop every few minutes.\n      <\u002Fp>\n    <\u002Fsection>\n\n    <!-- ============ METRICS (terminal) ============ -->\n    <section data-screen-label=\"Metrics\" data-reveal=\" style=\"font-weight:700; font-size:clamp(44px, 6.4vw, 76px); line-height:1; letter-spacing:-0.04em; color:var(--orange);\">98%+<\u002Fdiv>\n              <div style=\"margin-top:12px; font-size:13px; color:var(--muted);\"><span style=\"color:var(--faint);\">--<\u002Fspan>crash-free-sessions<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ SELECTED WORK ============ -->\n    <section id=\"work\" data-screen-label=\"Selected Work\" style=\"padding:0 0 clamp(56px, 10vh, 120px);\">\n      <h2 style=\"margin:0 0 clamp(32px, 5vh, 48px); font-family:'JetBrains Mono', monospace; font-weight:500; font-size:clamp(20px, 2.6vw, 26px); letter-spacing:-0.01em;\"><span style=\"color:var(--violet);\">fun<\u002Fspan> <span style=\"color:var(--ink);\">selectedWork<\u002Fspan><span style=\"color:var(--faint);\">(): List&lt;<\u002Fspan><span style=\"color:var(--cyan);\">Project<\u002Fspan><span style=\"color:var(--faint);\">&gt; {<\u002Fspan><\u002Fh2>\n\n      <div style=\"display:flex; flex-direction:column; gap:clamp(20px, 3vh, 28px); padding-left:clamp(0px, 2vw, 24px);\">\n\n        <article data-reveal=\"\" style=\"background:var(--panel); border:1px solid var(--rule); border-radius:12px; padding:clamp(24px, 4vh, 36px) clamp(20px, 4vw, 36px); transition:border-color 0.2s;\" style-hover=\"border-color:var(--faint);\">\n          <p style=\"margin:0 0 12px; font-family:'JetBrains Mono', monospace; font-size:13px; color:var(--faint); font-style:italic;\">// current · confidential — no screenshots, by design<\u002Fp>\n          <div style=\"display:flex; flex-wrap:wrap; align-items:baseline; gap:8px 14px;\">\n            <h3 style=\"margin:0; font-size:clamp(21px, 2.8vw, 27px); font-weight:600; letter-spacing:-0.01em;\">Enterprise E2E-encrypted messenger<\u002Fh3>\n            <span style=\"font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--green); background:var(--dim-green); border-radius:5px; padding:3px 9px;\">● now building<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"margin:14px 0 0; max-width:44em; color:var(--muted); text-wrap:pretty;\">\n            The Android client for a secure workplace messenger: Signal-protocol encryption over MQTT, voice and video on Janus WebRTC. I own session and multi-device key management end-to-end — and the unglamorous work of keeping calls alive on hostile networks.\n          <\u002Fp>\n          <p style=\"margin:16px 0 0; font-family:'JetBrains Mono', monospace; font-size:12.5px; color:var(--faint);\"><span style=\"color:var(--violet);\">val<\u002Fspan> stack <span style=\"color:var(--faint);\">=<\u002Fspan> <span style=\"color:var(--orange);\">[Kotlin, Compose, libsignal, MQTT, Janus WebRTC, Coroutines]<\u002Fspan><\u002Fp>\n        <\u002Farticle>\n\n        <article data-reveal=\"\" style=\"background:var(--panel); border:1px solid var(--rule); border-radius:12px; padding:clamp(24px, 4vh, 36px) clamp(20px, 4vw, 36px); transition:border-color 0.2s;\" style-hover=\"border-color:var(--faint);\">\n          <p style=\"margin:0 0 12px; font-family:'JetBrains Mono', monospace; font-size:13px; color:var(--faint); font-style:italic;\">// 1M+ installs · 100K+ DAU · $15M Series A<\u002Fp>\n          <h3 style=\"margin:0; font-size:clamp(21px, 2.8vw, 27px); font-weight:600; letter-spacing:-0.01em;\">Ride-sharing &amp; food-delivery super-app<\u002Fh3>\n          <p style=\"margin:14px 0 0; max-width:44em; color:var(--muted); text-wrap:pretty;\">\n            Core Android engineer through hypergrowth — rides, food, parcels. Rebuilt the ordering flow and real-time trip tracking for low-end devices on 2G: cold start cut in half, 98%+ crash-free held while traction underpinned the raise.\n          <\u002Fp>\n          <p style=\"margin:16px 0 0; font-family:'JetBrains Mono', monospace; font-size:12.5px; color:var(--faint);\"><span style=\"color:var(--violet);\">val<\u002Fspan> stack <span style=\"color:var(--faint);\">=<\u002Fspan> <span style=\"color:var(--orange);\">[Kotlin, Java, Maps SDK, Firebase, gRPC]<\u002Fspan><\u002Fp>\n        <\u002Farticle>\n\n        <article data-reveal=\"\" style=\"background:var(--panel); border:1px solid var(--rule); border-radius:12px; padding:clamp(24px, 4vh, 36px) clamp(20px, 4vw, 36px); transition:border-color 0.2s;\" style-hover=\"border-color:var(--faint);\">\n          <p style=\"margin:0 0 12px; font-family:'JetBrains Mono', monospace; font-size:13px; color:var(--faint); font-style:italic;\">// government of bangladesh · shipped in weeks<\u002Fp>\n          <h3 style=\"margin:0; font-size:clamp(21px, 2.8vw, 27px); font-weight:600; letter-spacing:-0.01em;\">National Covid-19 contact tracing<\u002Fh3>\n          <p style=\"margin:14px 0 0; max-width:44em; color:var(--muted); text-wrap:pretty;\">\n            A privacy-preserving BLE contact-tracing app for a country of 160 million. Battery-safe background scanning, Bangla-first localization, and onboarding that worked for people installing their first app.\n          <\u002Fp>\n          <p style=\"margin:16px 0 0; font-family:'JetBrains Mono', monospace; font-size:12.5px; color:var(--faint);\"><span style=\"color:var(--violet);\">val<\u002Fspan> stack <span style=\"color:var(--faint);\">=<\u002Fspan> <span style=\"color:var(--orange);\">[Kotlin, BLE, WorkManager, Room]<\u002Fspan><\u002Fp>\n        <\u002Farticle>\n\n        <article data-reveal=\"\" style=\"background:var(--panel); border:1px solid var(--rule); border-radius:12px; padding:clamp(24px, 4vh, 36px) clamp(20px, 4vw, 36px); transition:border-color 0.2s;\" style-hover=\"border-color:var(--faint);\">\n          <p style=\"margin:0 0 12px; font-family:'JetBrains Mono', monospace; font-size:13px; color:var(--faint); font-style:italic;\">// data collection where the network is a rumor<\u002Fp>\n          <h3 style=\"margin:0; font-size:clamp(21px, 2.8vw, 27px); font-weight:600; letter-spacing:-0.01em;\">Offline-first field data platform<\u002Fh3>\n          <p style=\"margin:14px 0 0; max-width:44em; color:var(--muted); text-wrap:pretty;\">\n            Built for field teams working days away from a signal. A conflict-free sync engine with queued, resumable media uploads — days of offline work reconciles cleanly the moment connectivity returns, with zero data loss.\n          <\u002Fp>\n          <p style=\"margin:16px 0 0; font-family:'JetBrains Mono', monospace; font-size:12.5px; color:var(--faint);\"><span style=\"color:var(--violet);\">val<\u002Fspan> stack <span style=\"color:var(--faint);\">=<\u002Fspan> <span style=\"color:var(--orange);\">[Kotlin, Room, SQLite, WorkManager]<\u002Fspan><\u002Fp>\n        <\u002Farticle>\n      <\u002Fdiv>\n      <p style=\"margin:clamp(24px, 4vh, 36px) 0 0; font-family:'JetBrains Mono', monospace; font-size:clamp(20px, 2.6vw, 26px); color:var(--faint);\">}<\u002Fp>\n    <\u002Fsection>\n\n    <!-- ============ APPS & PROJECTS ============ -->\n    <section id=\"apps\" data-screen-label=\"Apps &amp; Projects\" data-reveal=\"\" style=\"padding:0 0 clamp(56px, 10vh, 120px);\">\n      <h2 style=\"margin:0 0 10px; font-family:'JetBrains Mono', monospace; font-weight:500; font-size:clamp(20px, 2.6vw, 26px); letter-spacing:-0.01em;\"><span style=\"color:var(--green);\">$<\u002Fspan> ls ~/apps <span style=\"color:var(--faint);\">--all<\u002Fspan><\u002Fh2>\n      <p style=\"margin:0 0 clamp(28px, 4vh, 40px); font-family:'JetBrains Mono', monospace; font-size:13px; color:var(--faint); font-style:italic;\">// shipped to production + weekend builds<\u002Fp>\n\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:clamp(16px, 2.5vw, 24px); padding-left:clamp(0px, 2vw, 24px);\">\n\n        <div style=\"display:flex; gap:16px; align-items:flex-start; background:var(--panel); border:1px solid var(--rule); border-radius:12px; padding:20px; transition:border-color 0.2s;\" style-hover=\"border-colo  '--rule': '#252A24',\n      '--green': '#A3E635', '--cyan': '#67E8F9', '--orange': '#FDBA74',\n      '--violet': '#C4B5FD', '--dim-green': 'rgba(163,230,53,0.12)',\n      colorScheme: 'dark'\n    };\n  }\n\n  effectiveMode() {\n    const pref = this.state.override ?? this.props.theme ?? 'dark';\n    if (pref !== 'auto') return pref;\n    return (typeof window !== 'undefined' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';\n  }\n\n  applyTheme() {\n    const el = this.rootRef.current;\n    if (!el) return;\n    const p = this.palette(this.effectiveMode());\n    Object.keys(p).forEach((k) => { if (k.startsWith('--')) el.style.setProperty(k, p[k]); });\n    el.style.colorScheme = p.colorScheme;\n  }\n\n  componentDidMount() {\n    try {\n      const saved = localStorage.getItem('mc-portfolio-v4-theme');\n      if (saved === 'light' || saved === 'dark') this.setState({ override: saved });\n    } catch (e) {}\n    this.applyTheme();\n    if (window.matchMedia) {\n      this.mq = window.matchMedia('(prefers-color-scheme: dark)');\n      this.mqFn = () => { this.applyTheme(); this.forceUpdate(); };\n      this.mq.addEventListener('change', this.mqFn);\n    }\n    this.setupReveal();\n  }\n\n  componentDidUpdate() { this.applyTheme(); }\n\n  componentWillUnmount() {\n    if (this.mq && this.mqFn) this.mq.removeEventListener('change', this.mqFn);\n    if (this.io) this.io.disconnect();\n  }\n\n  setupReveal() {\n    const root = this.rootRef.current;\n    if (!root || !('IntersectionObserver' in window)) return;\n    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;\n    this.io = new IntersectionObserver((entries) => {\n      entries.forEach((en) => {\n        if (en.isIntersecting) {\n          en.target.style.opacity = '1';\n          en.target.style.transform = 'none';\n          this.io.unobserve(en.target);\n        }\n      });\n    }, { threshold: 0.08 });\n    root.querySelectorAll('[data-reveal]').forEach((el) => {\n      const r = el.getBoundingClientRect();\n      if (r.top > window.innerHeight * 0.92) {\n        el.style.opacity = '0';\n        el.style.transform = 'translateY(14px)';\n        el.style.transition = 'opacity 0.7s ease, transform 0.7s ease';\n        this.io.observe(el);\n      }\n    });\n  }\n\n  renderVals() {\n    return {\n      rootRef: this.rootRef,\n      themeLabel: this.effectiveMode() === 'dark' ? 'light_mode' : 'dark_mode',\n      toggleTheme: () => {\n        const next = this.effectiveMode() === 'dark' ? 'light' : 'dark';\n        try { localStorage.setItem('mc-portfolio-v4-theme', next); } catch (e) {}\n        this.setState({ override: next });\n      }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
